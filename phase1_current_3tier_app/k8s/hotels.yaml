apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotels
  namespace: demo-travel
  labels:
    app: hotels
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotels
  template:
    metadata:
      labels:
        app: hotels
    spec:
      containers:
      - name: hotels
        image: localhost:30500/demo-travel/hotels:v0.1
        imagePullPolicy: Always
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        ports:
        - containerPort: 5001

---
apiVersion: v1
kind: Service
metadata:
  name: hotels
  namespace: demo-travel
  labels:
    app: hotels
  annotations:
    f5.com/manage: "true"
spec:
  type: NodePort
  selector:
    app: hotels
  ports:
    - name: http
      protocol: TCP
      port: 5001
      targetPort: 5001
