apiVersion: apps/v1
kind: Deployment
metadata:
  name: flights
  namespace: demo-travel
  labels:
    app: flights
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flights
  template:
    metadata:
      labels:
        app: flights
    spec:
      containers:
      - name: flights
        image: localhost:30500/demo-travel/flights:v0.1
        imagePullPolicy: Always
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        ports:
        - containerPort: 5002

---
apiVersion: v1
kind: Service
metadata:
  name: flights
  namespace: demo-travel
  labels:
    app: flights
  annotations:
    # Example BIG-IP target annotation if using F5 CIS, or just documentation
    f5.com/manage: "true"
spec:
  type: NodePort
  selector:
    app: flights
  ports:
    - name: http
      protocol: TCP
      port: 5002
      targetPort: 5002
      nodePort: 31907
