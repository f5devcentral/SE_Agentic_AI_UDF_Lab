apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo-travel
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: localhost:30500/demo-travel/frontend:v0.1
        imagePullPolicy: Always
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        - name: PG_HOST
          value: "postgres"
        - name: PG_USER
          valueFrom:
            secretKeyRef:
              name: travel-db-secret
              key: username
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: travel-db-secret
              key: password
        - name: PG_DB
          value: "travel"
        # In a real deployed environment we might need FLIGHTS_URL and HOTELS_URL 
        # but the python app currently hardcodes "http://flights:5002" in Phase 1
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: demo-travel
  labels:
    app: frontend
  annotations:
    f5.com/manage: "true"
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 5000
      nodePort: 32609
