---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-mcp
  namespace: demo-travel
  labels:
    app: travel-mcp
    component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-mcp
  template:
    metadata:
      labels:
        app: travel-mcp
        component: mcp-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: travel-mcp
          image: 10.1.1.7:30500/demo-travel/travel-mcp:v0.4
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: mcp
              protocol: TCP
          env:
            # PostgreSQL Configuration (activities)
            - name: DB_HOST
              value: "10.1.20.40"
            - name: DB_PORT
              value: "32345"
            - name: DB_NAME
              value: "travel"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: travel-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: travel-db-secret
                  key: password
            
            # External REST API Endpoints
            # Update these to match your actual service IPs/ports
            - name: FLIGHTS_API_URL
              value: "http://10.1.20.40:31907/"
            - name: HOTELS_API_URL
              value: "http://10.1.20.40:31647/"
            - name: API_TIMEOUT
              value: "10"
            
            # OpenTelemetry Configuration
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: "travel-mcp"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
          
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          
---
apiVersion: v1
kind: Service
metadata:
  name: travel-mcp
  namespace: demo-travel
  labels:
    app: travel-mcp
spec:
  type: NodePort
  selector:
    app: travel-mcp
  ports:
    - name: mcp
      port: 8000
      targetPort: 8000
      nodePort: 30100
      protocol: TCP
