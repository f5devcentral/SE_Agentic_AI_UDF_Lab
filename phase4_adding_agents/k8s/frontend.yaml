apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: frontend
        image: 10.1.1.7:30500/ai/frontend_ai:v0.5
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
          # ─ Orchestrator ──────────────────────────────────────────────────
          - name: ORCHESTRATOR_URL
            value: "http://orchestrator:9000"
          - name: ORCHESTRATOR_TIMEOUT
            value: "600.0"

          # ─ Observability ─────────────────────────────────────────────────
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://otel-collector:4317"


        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        # Graceful shutdown to finish in‑flight requests
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]

---

apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
  - name: http
    protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30050
  type: NodePort
