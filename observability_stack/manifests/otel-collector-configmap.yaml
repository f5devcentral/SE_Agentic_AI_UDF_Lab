apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: demo-travel
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
      servicegraph:
        store:
          ttl: 5s

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"

      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

      loki:
        endpoint: http://loki.demo-travel.svc.cluster.local:3100/loki/api/v1/push

      debug:
        verbosity: detailed

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, servicegraph]
          exporters: [otlp/tempo, debug]

        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki, debug]
