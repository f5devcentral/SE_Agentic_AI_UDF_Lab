# Fluentd DaemonSet for K3s clusters (forwarding to OTEL Collector)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: fluentd
  template:
    metadata:
      labels:
        name: fluentd
    spec:
      serviceAccountName: fluentd
      containers:
      - name: fluentd
        image: fluent/fluentd:v1.16-1
        env:
        - name: OTEL_COLLECTOR_HOST
          value: "otel-collector.demo-travel.svc.cluster.local"
        - name: OTEL_COLLECTOR_PORT
          value: "4317"
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: config-volume
          mountPath: /fluentd/etc
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: config-volume
        configMap:
          name: fluentd-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: kube-system
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kube.*
      format json
    </source>
    <match **>
      @type opentelemetry
      host "${OTEL_COLLECTOR_HOST}"
      port ${OTEL_COLLECTOR_PORT}
      protocol grpc
    </match>

