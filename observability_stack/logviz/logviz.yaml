---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logviz
  labels:
    app: logviz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logviz
  template:
    metadata:
      labels:
        app: logviz
    spec:
      containers:
        - name: logviz
          image: 10.1.1.7:30500/ai/logviz:v0.5 
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: logviz
spec:
  type: NodePort
  selector:
    app: logviz
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30980 
