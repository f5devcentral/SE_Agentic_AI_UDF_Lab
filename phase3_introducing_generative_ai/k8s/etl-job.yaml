apiVersion: batch/v1
kind: Job
metadata:
  name: etl-job
spec:
  template:
    metadata:
      labels:
        app: etl-job
    spec:
      restartPolicy: Never
      containers:
        - name: etl-job
          image: 10.1.1.7:30500/ai/etl-job:v0.7
          imagePullPolicy: Always
          env:
            # S3 / MinIO
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD

            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: S3_BUCKET
              value: "travel-data"

            # Postgres
            - name: PG_HOST
              value: "postgres"
            - name: PG_DB
              value: "ragdb"
            - name: PG_USER
              value: "postgres"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PG_PORT
              value: "5432"

            # Ollama embeddings
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: EMBED_MODEL
              value: "nomic-embed-text"

            # Tracing
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
  backoffLimit: 1
